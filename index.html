<!DOCTYPE html>
<html>

<head>
    <title>JSON Task Tracker</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 450px;
            margin: 40px auto;
            padding: 20px;
            background: #fafafa;
        }

        h2 {
            color: #0078d4;
            text-align: center;
        }

        .row {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type='text'] {
            flex: 1;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            padding: 8px 12px;
            background: #0078d4;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        li {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px;
            background: white;
            margin-bottom: 6px;
            border-radius: 4px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
            gap: 12px;
        }

        .task-text {
            font-size: 15px;
            word-break: break-word;
            color: #333;
        }

        .task-time {
            font-size: 11px;
            color: #777;
            margin-top: 2px;
        }

        .completed {
            text-decoration: line-through;
            color: #888;
        }

        .del {
            background: #d83b01;
            padding: 6px 10px;
            font-size: 12px;
            flex-shrink: 0;
        }

        #addBtn:disabled {
            background-color: #cccccc;
            color: #666666;
            cursor: not-allowed;
        }

        input[type='checkbox'] {
            width: 16px;
            height: 16px;
            margin: 0;
            cursor: pointer;
            flex-shrink: 0;
        }
    </style>
</head>

<body>
    <h2>Task Tracker</h2>
    <div class='row'>
        <input type='text' id='taskText' placeholder='What is the Task?'>
        <button id='addBtn' onclick='addTask()' disabled>Add</button>
    </div>
    <ul id='list'></ul>

    <script>
        const inputField = document.getElementById('taskText');
        const addButton = document.getElementById('addBtn');

        // changes- disabling button for empty input
        inputField.addEventListener('input', () => {
            addButton.disabled = inputField.value.trim() === '';
        });

        // changes- Task can be added by Enter button
        inputField.addEventListener('keydown', (event) => {
            if (event.key === 'Enter' && inputField.value.trim() !== '') {
                addTask();
            }
        });

        async function loadTasks() {
            const res = await fetch('/api/tasks');
            const tasks = await res.json();
            const list = document.getElementById('list');
            list.innerHTML = '';
            tasks.forEach(t => {
                const dateObj = new Date(t.createdAt);
                const formattedTime = dateObj.toLocaleDateString() + ' ' + dateObj.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                list.innerHTML += `
                        <li>
                            <input type='checkbox' ${t.isCompleted ? 'checked' : ''} onclick='toggleTask("${t.id}")'>
                            <span class='${t.isCompleted ? 'completed' : ''}'>${t.text}</span>
                            <span class='task-time'>Created: ${formattedTime}</span>
                            <button class='del' onclick='deleteTask("${t.id}")'>Delete</button>
                        </li>`;
            });
        }

        async function addTask() {
            const input = document.getElementById('taskText');
            if (!input.value.trim()) return;
            await fetch('/api/tasks', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: input.value })
            });
            input.value = '';
            addButton.disabled = true;
            input.focus();
            loadTasks();
        }

        async function toggleTask(id) {
            await fetch('/api/tasks/' + id, { method: 'PUT' });
            loadTasks();
        }

        async function deleteTask(id) {
            // Changes- Ask user confirmation for deletion
            const userConfirmed = confirm("Are you sure you want to delete this task?");
            if (!userConfirmed) {
                return;
            }
            await fetch('/api/tasks/' + id, { method: 'DELETE' });
            loadTasks();
        }

        loadTasks();
    </script>
</body>

</html>
