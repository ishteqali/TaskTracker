<!DOCTYPE html>
<html>

<head>
    <title>JSON Task Tracker</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 650px;
            margin: 40px auto;
            padding: 20px;
            background: #fafafa;
        }

        h2 {
            color: #0078d4;
            text-align: center;
        }

        .row {
            display: flex;
            gap: 10px;
            margin-bottom: 5px;
        }

        input[type='text'] {
            flex: 1;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            padding: 8px 12px;
            background: #0078d4;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        li {
            display: grid;
            grid-template-columns: 30px 1fr 130px 65px;
            align-items: center;
            padding: 10px;
            background: white;
            margin-bottom: 6px;
            border-radius: 4px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
            gap: 12px;
        }

        input[type='checkbox'] {
            width: 16px;
            height: 16px;
            margin: 0;
            cursor: pointer;
        }

        .del-container {
            text-align: right;
        }

        .task-content {
            font-size: 15px;
            word-break: break-word;
            color: #333;
            text-align: left;
            padding-right: 10px;
        }

        .task-time {
            font-size: 10px;
            color: #777;
            text-align: left;
        }

        .completed {
            text-decoration: line-through;
            color: #888;
        }

        .del {
            background: #d83b01;
            padding: 6px 10px;
            font-size: 12px;
        }

        #addBtn:disabled {
            background-color: #cccccc;
            color: #666666;
            cursor: not-allowed;
        }

        .counter-container {
            margin-bottom: 20px;
            padding-left: 2px;
        }
    </style>
</head>

<body>
    <h2>Task Tracker</h2>
    <div class='row'>
        <input type='text' id='taskText' placeholder='What is the Task?' maxlength='100'>
        <button id='addBtn' onclick='addTask()' disabled>Add</button>
    </div>
    <div class="counter-container">
        <small id="charCounter">0 / 100 characters</small>
    </div>
    <ul id='list'></ul>

    <script>
        const inputField = document.getElementById('taskText');
        const addButton = document.getElementById('addBtn');
        const charCounter = document.getElementById('charCounter');
        const maxLength = 100;

        // changes- disabling button for empty input
        inputField.addEventListener('input', () => {

            // changes- character counter
            const currentLength = inputField.value.length;
            charCounter.textContent = `${currentLength} / ${maxLength} characters`;
            if (currentLength >= maxLength) {
                charCounter.style.color = '#dc3545';
            } else if (currentLength >= maxLength - 20) {
                charCounter.style.color = '#fd7e14';
            } else {
                charCounter.style.color = '#666666';
            }

            // changes- disabling button for empty input
            addButton.disabled = inputField.value.trim() === '';
        });

        // changes- Task can be added by Enter button
        inputField.addEventListener('keydown', (event) => {
            if (event.key === 'Enter' && inputField.value.trim() !== '') {
                addTask();
            }
        });

        async function loadTasks() {
            const res = await fetch('/api/tasks');
            const tasks = await res.json();
            const list = document.getElementById('list');
            list.innerHTML = '';
            tasks.forEach(t => {
                const dateObj = new Date(t.createdAt);
                const formattedTime = dateObj.toLocaleDateString() + ' ' + dateObj.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                const li = document.createElement('li');
                li.innerHTML = `
                    <input type='checkbox' ${t.isCompleted ? 'checked' : ''} onclick='toggleTask("${t.id}")'>
                    <span class='task-content ${t.isCompleted ? 'completed' : ''}'></span>
                    <span class='task-time'>Created: ${formattedTime}</span>
                    <button class='del' onclick='deleteTask("${t.id}")'>Delete</button>
                `;
                li.querySelector('.task-content').textContent = t.text;
                list.appendChild(li);
            });
        }

        async function addTask() {
            const input = document.getElementById('taskText');
            if (!input.value.trim()) return;
            await fetch('/api/tasks', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: input.value })
            });
            // changes- resetting input and character counter after adding task
            input.value = '';
            charCounter.textContent = `0 / ${maxLength} characters`;
            charCounter.style.color = '#666666';

            addButton.disabled = true;
            input.focus();
            loadTasks();
        }

        async function toggleTask(id) {
            await fetch('/api/tasks/' + id, { method: 'PUT' });
            loadTasks();
        }

        async function deleteTask(id) {
            // Changes- Ask user confirmation for deletion
            const userConfirmed = confirm("Are you sure you want to delete this task?");
            if (!userConfirmed) {
                return;
            }
            await fetch('/api/tasks/' + id, { method: 'DELETE' });
            loadTasks();
        }

        loadTasks();
    </script>
</body>

</html>
